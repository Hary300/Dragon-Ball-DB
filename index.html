<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dragon Ball DB</title>
    <link
      rel="shortcut icon"
      href="./assets/icons/dragon-ball.png"
      type="image/x-icon"
    />
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-position-center flex min-h-screen flex-col items-center bg-[url(/assets/images/background.png)] bg-cover font-sans text-white"
  >
    <div
      class="h-[2000px] w-full border-2 border-[rgba(222,132,53,0.9)] shadow-[0_0_40px_rgba(222,132,53,0.9)] md:max-w-300"
    >
      <!-- bg-[url(/assets/images/background.png)] -->

      <!-- header -->
      <header
        class="relative flex w-full items-center justify-between bg-black px-5 pt-4 pb-1 md:px-10 md:pt-5 md:pb-3 lg:px-20 lg:pt-8"
      >
        <!-- left side -->
        <div class="flex items-center gap-1">
          <img
            src="./assets/images/dragon-ball.png"
            alt="dragon ball"
            class="w-5 md:w-7 lg:w-8"
          />

          <h2 class="font-Sriracha text-sm font-bold md:text-2xl lg:text-3xl">
            <span class="text-[#f9ea53]">DRAGON </span
            ><span class="text-[#e68032]">BALL </span
            ><span class="text-[#dd3c2a]">DB</span>
          </h2>
        </div>

        <!-- right side (nav) -->
        <!-- mobile navbar hamburgerBtn -->
        <div class="flex flex-col gap-1 md:hidden">
          <span class="h-0.5 w-4 rounded-2xl bg-[#d5d5d5]"></span>
          <span class="h-0.5 w-4 rounded-2xl bg-[#d5d5d5]"></span>
          <span class="h-0.5 w-4 rounded-2xl bg-[#d5d5d5]"></span>
        </div>
        <!-- desktop navbar -->
        <nav class="hidden text-white/65 md:block lg:text-lg">
          <ul class="flex gap-5 lg:gap-15">
            <li class="cursor-pointer">Home</li>
            <li class="cursor-pointer">Character</li>
            <li class="cursor-pointer">About</li>
          </ul>
        </nav>
      </header>

      <!-- hero -->
      <section class="hero relative w-full p-5 md:px-10 md:py-7 lg:px-20">
        <!-- layer background -->
        <div
          class="absolute inset-0 bg-[url(/assets/images/banner.png)] bg-cover bg-position-[86%]"
        ></div>

        <!-- gradient -->
        <div
          class="absolute top-0 left-0 h-16 w-full bg-linear-to-b from-black to-transparent"
        ></div>

        <div
          class="absolute bottom-0 left-0 h-16 w-full bg-linear-to-t from-black to-transparent"
        ></div>

        <!-- left side (text) -->
        <div class="relative z-10 flex flex-col gap-1 md:gap-6 lg:gap-6">
          <p
            class="text-xs font-semibold text-[#de8536] md:text-xl lg:text-2xl"
          >
            - EXPLORE THE -
          </p>
          <h1
            class="font-Sriracha text-3xl font-bold md:text-5xl md:tracking-wide lg:text-6xl lg:tracking-wider"
          >
            DRAGON BALL <br />
            UNIVERSE
          </h1>
          <p class="text-[10px] text-white/65 md:text-[15px] lg:text-lg">
            Browse characters
          </p>
        </div>
      </section>

      <!-- Search -->
      <div
        class="relative flex w-full flex-col justify-between gap-3 bg-black px-5 pt-3 pb-5 md:flex-row md:gap-20 md:px-10 lg:px-20"
      >
        <!-- search and race -->
        <div class="relative flex flex-col gap-3 md:flex-3 md:flex-row">
          <input
            type="text"
            class="w-full cursor-pointer rounded-xl border border-[rgba(222,132,53,0.9)] py-3 pl-10 text-xs focus:shadow-[0_0_20px_rgba(222,132,53,0.9)] focus:ring-1 focus:ring-[rgb(222,132,53)] focus:outline-none md:flex-2"
            placeholder="Search character..."
          />
          <img
            src="./assets/icons/search.png"
            alt="magnifying glass"
            class="absolute top-3 left-3 md:left-3.5"
            width="20"
          />

          <div class="relative md:flex-1">
            <select
              name="race"
              id="race"
              class="w-full cursor-pointer rounded-xl border border-[rgba(225,100,41,0.9)] bg-transparent py-3 pl-10 text-xs text-white/50 focus:bg-black focus:shadow-[0_0_20px_rgba(225,100,41,0.9)] focus:ring-1 focus:ring-[rgba(225,100,41,0.9)] focus:outline-none"
            >
              <option value="" disabled selected>Races</option>
              <option value="">2</option>
              <option value="">3</option>
              <option value="">4</option>
              <option value="">5</option>
            </select>

            <div
              class="absolute top-2.5 left-2.5 h-6 w-6 rounded-full border border-[rgba(222,132,53,0.9)] shadow-[0_0_15px_rgba(222,132,53,0.9)]"
            >
              <img src="./assets/icons/race-icon.png" alt="" />
            </div>
          </div>
        </div>

        <!-- sort by -->
        <div class="relative md:flex-1">
          <select
            name="race"
            id="race"
            class="w-full cursor-pointer rounded-xl border border-[rgba(255,255,255,0.9)] bg-transparent py-3 pl-10 text-xs text-white/50 focus:bg-black focus:shadow-[0_0_15px_rgba(255,255,255,0.9)] focus:ring-1 focus:ring-[rgba(225,255,255,0.9)] focus:outline-none"
          >
            <option value="" disabled selected>Sort by</option>
            <option value="">2</option>
            <option value="">3</option>
            <option value="">4</option>
            <option value="">5</option>
          </select>

          <div
            class="absolute top-2.5 left-2.5 h-6 w-6 rounded-full border border-[rgba(222,225,255,0.9)] shadow-[0_0_15px_rgba(255,255,255,0.9)]"
          >
            <img
              src="./assets/icons/sort.png"
              alt=""
              class="mt-1.5 scale-200"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
